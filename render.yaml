services:
  - type: web
    name: baseline-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -lc "./baseline api serve --addr 0.0.0.0:${PORT:-10000}"
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /healthz
    envVars:
      - key: BASELINE_API_DB_DRIVER
        value: postgres
      - key: BASELINE_API_DATABASE_URL
        sync: false
      - key: BASELINE_API_REQUIRE_HTTPS
        value: "true"
      - key: BASELINE_API_TRUST_PROXY_HEADERS
        value: "true"
      - key: BASELINE_API_SELF_SERVICE_ENABLED
        value: "false"
      - key: BASELINE_API_AI_ENABLED
        value: "false"
      - key: BASELINE_API_DASHBOARD_SESSION_ENABLED
        value: "true"
      - key: BASELINE_API_DASHBOARD_SESSION_ROLE
        value: operator
      - key: BASELINE_API_DASHBOARD_SESSION_COOKIE_SECURE
        value: "true"
      - key: BASELINE_API_SUPABASE_ENABLED
        value: "true"
      - key: BASELINE_API_SUPABASE_DEFAULT_ROLE
        value: operator
      - key: BASELINE_API_KEY_HASH_SECRET
        generateValue: true
      - key: BASELINE_API_KEY
        sync: false
      - key: BASELINE_API_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_AUTH_REDIRECT_TO
        sync: false
      - key: BASELINE_API_SUPABASE_URL
        sync: false
      - key: BASELINE_API_SUPABASE_CLIENT_ID
        sync: false
      - key: BASELINE_API_SUPABASE_CLIENT_SECRET
        sync: false
      - key: BASELINE_API_SUPABASE_CALLBACK_URL
        sync: false
