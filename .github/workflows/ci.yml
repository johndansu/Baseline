name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version label to embed in packaged artifacts"
        required: false
        default: "manual"
  release:
    types: [published]

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.26.1"
  NODE_VERSION: "20"
  GOSEC_VERSION: "v2.22.9"
  GOVULNCHECK_VERSION: "v1.1.4"
  BASELINE_PRIMARY_BRANCH: "main"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run API contract checks
        run: go test ./internal/api -run "TestOpenAPIOperationsReturnDocumentedStatuses|TestContractResponseShapesForCoreEndpoints" -count=1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  postgres-store:
    name: Postgres Store Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: baseline_test
          POSTGRES_USER: baseline
          POSTGRES_PASSWORD: baseline
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U baseline -d baseline_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run focused Postgres store tests
        env:
          BASELINE_TEST_POSTGRES_URL: postgres://baseline:baseline@127.0.0.1:${{ job.services.postgres.ports[5432] }}/baseline_test?sslmode=disable
        run: go test ./internal/api -run '^TestPostgresStore' -count=1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-nodejs/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run dashboard secret scan gate
        run: bash ./scripts/secret-scan-dashboard.sh

      - name: Run npm audit (prod deps, high+)
        working-directory: frontend-nodejs
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - name: Install security tooling
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}

      - name: Run gosec (high-confidence strict)
        run: |
          mkdir -p security
          "$(go env GOPATH)/bin/gosec" \
            -severity high \
            -confidence high \
            -exclude G204,G304 \
            -fmt sarif \
            -out security/gosec.sarif \
            ./...

      - name: Upload gosec SARIF
        if: always() && hashFiles('security/gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3.27.9
        with:
          sarif_file: security/gosec.sarif

      - name: Run govulncheck (strict)
        run: $(go env GOPATH)/bin/govulncheck ./...

  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    needs: [test, postgres-store]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run hardening gate
        run: |
          go test ./...
          go run ./cmd/baseline check
          go run ./cmd/baseline report --json > /tmp/baseline-report.json
          go run ./cmd/baseline report --sarif > /tmp/baseline-report.sarif

      - name: Run API contract + e2e + performance smoke gates
        run: go test ./internal/api -run "TestOpenAPIOperationsReturnDocumentedStatuses|TestContractResponseShapesForCoreEndpoints|TestBackendE2ESuite|TestHighReadEndpointsPerformanceSmoke" -count=1

      - name: Run CLI parity matrix gates (dashboard backend)
        run: go test ./internal/api -run "TestCLIDashboardParityMatrix|TestCLIDashboardParityPolicyCatalogFX07|TestCLIDashboardParityReportFormatsFX08" -count=1

  api-smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    needs: [test, postgres-store]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run production-like API smoke gate
        run: bash ./scripts/api-smoke.sh .artifacts/api-smoke-ci 127.0.0.1:18080

      - name: Upload API smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: api-smoke-artifacts
          path: .artifacts/api-smoke-ci
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, postgres-store, security-scan, release-gates, api-smoke]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: baseline-linux-amd64
          - goos: windows
            goarch: amd64
            binary: baseline-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            binary: baseline-darwin-amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/baseline/baseline/internal/version.Version=${{ github.ref_name }} -X github.com/baseline/baseline/internal/version.GitCommit=${{ github.sha }} -X github.com/baseline/baseline/internal/version.BuildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -o "dist/${{ matrix.binary }}" ./cmd/baseline

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, postgres-store, security-scan, release-gates, api-smoke]
    if: (github.event_name == 'release' && github.event.action == 'published') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Package release artifacts
        id: package
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || github.ref_name }}
        run: |
          set -euo pipefail
          bash ./scripts/package-release.sh .artifacts/release
          run_dir="$(find .artifacts/release -mindepth 1 -maxdepth 1 -type d | sort | tail -n1)"
          if [[ -z "${run_dir}" ]]; then
            echo "release packaging did not produce an output directory" >&2
            exit 1
          fi
          echo "run_dir=${run_dir}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign release artifacts (keyless)
        run: |
          set -euo pipefail
          for file in \
            "${{ steps.package.outputs.run_dir }}/archives/"* \
            "${{ steps.package.outputs.run_dir }}/SHA256SUMS.binaries" \
            "${{ steps.package.outputs.run_dir }}/SHA256SUMS.archives"
          do
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "$file"
          done

      - name: Upload packaged release bundle
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4.4.3
        with:
          name: baseline-release-bundle-${{ github.run_number }}
          path: ${{ steps.package.outputs.run_dir }}
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: |
            ${{ steps.package.outputs.run_dir }}/archives/*
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.binaries
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.archives
            ${{ steps.package.outputs.run_dir }}/metadata.txt
            ${{ steps.package.outputs.run_dir }}/RELEASE_INFO.txt
            ${{ steps.package.outputs.run_dir }}/archives/*.sig
            ${{ steps.package.outputs.run_dir }}/archives/*.pem
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.binaries.sig
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.binaries.pem
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.archives.sig
            ${{ steps.package.outputs.run_dir }}/SHA256SUMS.archives.pem
          draft: false
          prerelease: false
