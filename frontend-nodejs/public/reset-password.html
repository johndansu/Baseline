<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - Baseline</title>
  <meta name="description" content="Reset your Baseline account password.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/baseline favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/baseline favicon.png">
  <link rel="shortcut icon" href="/assets/images/baseline favicon.png">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/runtime-config.js"></script>
  <script type="module" src="/js/supabase-config.js"></script>
</head>
<body class="landing-body experience-page auth-page">
  <div class="landing-wrap">
    <header class="topbar">
      <a class="brand" href="/index.html">
        <img src="/assets/images/baseline logo.png" alt="Baseline logo" class="brand-logo">
        <div class="brand-text">
          <strong>Baseline</strong>
          <span>Production Policy Engine</span>
        </div>
      </a>
    </header>

    <section class="signin-section">
      <div class="signin-form reset-password-form">
        <h2>Reset Password</h2>
        <p id="reset-password-intro">Request a password reset email or complete your recovery link.</p>

        <div id="reset-password-request-panel">
          <form class="auth-form" id="reset-password-request-form">
            <div class="form-group">
              <label for="reset-email">Email</label>
              <input type="email" id="reset-email" name="email" required placeholder="your.email@company.com">
            </div>
            <div class="form-actions">
              <button type="submit" class="btn primary full-width">Send reset email</button>
            </div>
          </form>
        </div>

        <div id="reset-password-confirm-panel" style="display:none;">
          <form class="auth-form" id="reset-password-confirm-form">
            <div class="form-group">
              <label for="new-password">New password</label>
              <div class="password-field">
                <input type="password" id="new-password" name="password" placeholder="Enter a new password" autocomplete="new-password">
                <button type="button" class="password-toggle" data-password-toggle="new-password" aria-label="Show new password">Show</button>
              </div>
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm password</label>
              <div class="password-field">
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your new password" autocomplete="new-password">
                <button type="button" class="password-toggle" data-password-toggle="confirm-password" aria-label="Show confirm password">Show</button>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn primary full-width">Update password</button>
            </div>
          </form>
        </div>

        <div class="auth-links">
          <p><a href="/signin.html">Back to sign in</a></p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 Baseline. Production Policy Engine.</p>
    </footer>
  </div>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
