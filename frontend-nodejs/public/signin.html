<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Baseline</title>
  <meta name="description" content="Sign in to Baseline dashboard to manage production policies and releases.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/baseline favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/baseline favicon.png">
  <link rel="shortcut icon" href="/assets/images/baseline favicon.png">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/runtime-config.js"></script>
  <script type="module" src="/js/supabase-config.js"></script>
</head>
<body class="landing-body experience-page auth-page">
  <div class="landing-wrap">
    <header class="topbar">
      <a class="brand" href="/index.html">
        <img src="/assets/images/baseline logo.png" alt="Baseline logo" class="brand-logo">
        <div class="brand-text">
          <strong>Baseline</strong>
          <span>Production Policy Engine</span>
        </div>
      </a>
    </header>

    <section class="signin-section">
      <div class="signin-form">
        <h2>Sign In</h2>
        <p>Access your Baseline workspace.</p>
        
        <form class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your.email@company.com">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
          </div>
          
          <div class="form-actions">
            <button type="submit" class="btn primary full-width">Sign In</button>
          </div>
        </form>
        
        <div class="oauth-divider">
          <span>OR</span>
        </div>
        
        <div class="oauth-buttons">
          <button type="button" id="googleSignInBtn" class="btn oauth-btn google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path fill="#4285F4" d="M16.51 9H9v3h4.5c-.4 2-1.9 3.5-4 3.5-2.4 0-4.5-2-4.5-4.5s2.1-4.5 4.5-4.5c1.1 0 2.1.4 2.9 1.1l2.4-2.4C16.4 3.7 14.6 3 12.5 3 8.9 3 6 5.9 6 9.5S8.9 16 12.5 16c3.6 0 6.5-2.9 6.5-6.5 0-.5-.1-1-.2-1.5z"/>
              <path fill="#34A853" d="M6 9.5c0-1.1.3-2.1.8-2.9L3.7 4.1C2.6 5.5 2 7.4 2 9.5s.6 4 1.7 5.4l3.1-2.5c-.5-.8-.8-1.8-.8-2.9z"/>
              <path fill="#FBBC05" d="M12.5 3c1.8 0 3.4.7 4.6 1.8l2.4-2.4C16.4.7 14.6 0 12.5 0 8.9 0 6 2.9 6 6.5L9.5 9.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5z"/>
              <path fill="#EA4335" d="M12.5 16c-1.4 0-2.5-1.1-2.5-2.5H6c0 3.6 2.9 6.5 6.5 6.5 2.1 0 3.9-.7 5.2-2.1l-2.4-2.4c-.8.8-1.8 1.2-2.8 1.2z"/>
            </svg>
            Continue with Google
          </button>
          
          <button type="button" id="githubSignInBtn" class="btn oauth-btn github-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
              <path d="M9 1C4.58 1 1 4.58 1 9c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0017 9c0-4.42-3.58-8-8-8z"/>
            </svg>
            Continue with GitHub
          </button>
        </div>
        
        <div class="auth-links">
          <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
          <p><a href="#">Forgot password?</a></p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 Baseline. Production Policy Engine.</p>
    </footer>
  </div>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
